<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Slump - Premium Routine</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d0b14;
            --panel-bg: rgba(23, 20, 33, 0.75);
            --accent-purple: #a78bfa;
            --accent-red: #ef4444;
            --accent-gold: #fbbf24;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(167, 139, 250, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* VIDEO BACKGROUND SYSTEM */
        .video-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-bg-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Dark Luxury Overlay to maintain text contrast */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(13, 11, 20, 0.85) 0%, rgba(20, 10, 25, 0.9) 100%);
            z-index: -1;
        }

        /* APP AUTH SCREEN */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(15px);
            background: rgba(13, 11, 20, 0.9);
            transition: all 0.5s ease;
        }

        .auth-card {
            background: var(--panel-bg);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .auth-icon {
            font-size: 3.5rem;
            color: var(--accent-purple);
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .input-group input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.3);
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(90deg, #a78bfa, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(167, 139, 250, 0.6);
        }

        /* MAIN DASHBOARD */
        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: var(--panel-bg);
            padding: 1.2rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(5px);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-red));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* ANALYTICS CARD */
        .analytics-card {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 2.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(5px);
        }

        .progress-circle-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .progress-value {
            font-size: 1.8rem;
            font-weight: 700;
            position: absolute;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            flex-grow: 1;
        }

        .stat-box {
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* CREATOR BLOCK */
        .creator-section {
            background: var(--panel-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            backdrop-filter: blur(5px);
        }

        .task-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .task-input-row input {
            flex-grow: 1;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .task-input-row input:focus {
            border-color: var(--accent-purple);
        }

        .select-category {
            padding: 1rem;
            background: #171421;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: white;
            outline: none;
            cursor: pointer;
        }

        .btn-add {
            padding: 0 1.5rem;
            background: var(--accent-purple);
            border: none;
            border-radius: 12px;
            color: #0d0b14;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-add:hover {
            opacity: 0.9;
        }

        /* FILTERS */
        .filter-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .filter-btn {
            padding: 0.5rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid transparent;
            border-radius: 20px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: rgba(167, 139, 250, 0.15);
            border-color: var(--accent-purple);
            color: white;
        }

        /* TASKS MATRIX */
        .tasks-grid {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            min-height: 200px;
            backdrop-filter: blur(5px);
        }

        .grid-title {
            font-size: 1.1rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            margin-bottom: 0.8rem;
            border-left: 4px solid var(--accent-purple);
            transition: all 0.3s ease;
        }

        .task-item.completed {
            opacity: 0.5;
            border-left-color: var(--text-muted);
            text-decoration: line-through;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-custom {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-purple);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .task-item.completed .checkbox-custom {
            background: var(--accent-purple);
        }

        .checkbox-custom::after {
            content: '✓';
            color: #0d0b14;
            font-size: 12px;
            display: none;
            font-weight: bold;
        }

        .task-item.completed .checkbox-custom::after {
            display: block;
        }

        .task-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag-study { background: rgba(167, 139, 250, 0.2); color: #c084fc; }
        .tag-health { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .tag-deen { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .tag-personal { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }

        .btn-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }

        .btn-delete:hover {
            color: var(--accent-red);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 1rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <!-- K-DRAMA VIDEO FON TIZIMI -->
    <div class="video-bg-container">
        <!-- Yuqori sifatli sokin estetika va o'qish motivatsiyasi videosi (Pexels bepul hovuzidan olingan) -->
        <video autoplay loop muted playsinline poster="https://images.pexels.com/photos/3184292/pexels-photo-3184292.jpeg">
            <source src="https://player.vimeo.com/external/477123992.sd.mp4?s=e84e568ebcd57297f698e404b90f4db2393ba02f&profile_id=165&oauth2_token_id=57447761" type="video/mp4">
            Sizning brauzeringiz videoni qo'llab-quvvatlamaydi.
        </video>
    </div>
    <div class="video-overlay"></div>

    <!-- KIRISH EKRANI -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-icon"><i class="fas fa-stethoscope"></i></div>
            <div class="auth-title">Doctor Slump</div>
            <div class="auth-subtitle">Optimized Mental Focus & Routine Engine</div>
            <div class="input-group">
                <input type="text" id="username-input" placeholder="Enter your handle..." autocomplete="off">
            </div>
            <button class="btn-primary" onclick="initializeWorkspace()">Initialize Workspace</button>
        </div>
    </div>

    <!-- ASOSIY INTERFEYS -->
    <div class="app-container" id="main-dashboard">
        <header>
            <div class="user-profile">
                <div class="avatar" id="user-avatar">U</div>
                <div>
                    <h3 id="welcome-text">Workspace</h3>
                    <p style="font-size: 0.75rem; color: var(--text-muted);">⚡ Hot Girls Study Hard</p>
                </div>
            </div>
            <div style="font-size: 1.2rem; font-weight: bold; color: var(--accent-gold);">
                <i class="fas fa-fire"></i> <span id="streak-counter">0</span> Days
            </div>
        </header>

        <!-- STATISTIKA PANELI -->
        <div class="analytics-card">
            <div class="progress-circle-container">
                <!-- SVG progress doirasi -->
                <svg width="120" height="120" style="transform: rotate(-90deg);">
                    <circle cx="60" cy="60" r="50" stroke="rgba(255,255,255,0.05)" stroke-width="8" fill="transparent"/>
                    <circle id="progress-bar" cx="60" cy="60" r="50" stroke="var(--accent-purple)" stroke-width="8" fill="transparent"
                            stroke-dasharray="314" stroke-dashoffset="314" style="transition: stroke-dashoffset 0.4s ease;"/>
                </svg>
                <div class="progress-value" id="progress-percentage">0%</div>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">Completed</div>
                    <div class="stat-number" id="stats-completed">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Remaining</div>
                    <div class="stat-number" id="stats-remaining">0</div>
                </div>
            </div>
        </div>

        <!-- YANGI VAZIFA QO'SHISH -->
        <div class="creator-section">
            <div class="task-input-row">
                <input type="text" id="task-input" placeholder="Type a task objective...">
                <select id="category-input" class="select-category">
                    <option value="study">Study 📚</option>
                    <option value="health">Health 💪</option>
                    <option value="deen">Deen 🕌</option>
                    <option value="personal">Personal ⚡</option>
                </select>
                <button class="btn-add" onclick="addTask()">Add Task</button>
            </div>
        </div>

        <!-- SARALASH TUGMALARI -->
        <div class="filter-row">
            <button class="filter-btn active" onclick="filterTasks('all', this)">All Items</button>
            <button class="filter-btn" onclick="filterTasks('study', this)">Study 📚</button>
            <button class="filter-btn" onclick="filterTasks('health', this)">Health 💪</button>
            <button class="filter-btn" onclick="filterTasks('deen', this)">Deen 🕌</button>
            <button class="filter-btn" onclick="filterTasks('personal', this)">Personal ⚡</button>
        </div>

        <!-- VAZIFALAR RO'YXATI -->
        <div class="tasks-grid">
            <div class="grid-title"><i class="fas fa-layer-group"></i> Daily Execution Grid</div>
            <div id="tasks-container">
                <!-- Dinamik elementlar shu yerga tushadi -->
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('hottie_tasks')) || [];
        let currentFilter = 'all';
        let currentUsername = localStorage.getItem('hottie_username') || '';

        window.onload = function() {
            if (currentUsername) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                setupDashboard();
            }
            
            // Notification so'rash
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        };

        function initializeWorkspace() {
            const input = document.getElementById('username-input').value.trim();
            if (!input) return alert('Iltimos, ismingizni kiriting!');
            
            localStorage.setItem('hottie_username', input);
            currentUsername = input;
            
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                setupDashboard();
            }, 500);
        }

        function setupDashboard() {
            document.getElementById('welcome-text').innerText = `${currentUsername}'s Workspace`;
            document.getElementById('user-avatar').innerText = currentUsername.charAt(0).toUpperCase();
            updateStreak();
            renderTasks();
        }

        function updateStreak() {
            let streak = localStorage.getItem('hottie_streak') || 0;
            let lastDate = localStorage.getItem('hottie_last_date');
            const today = new Date().toDateString();

            if (lastDate === today) {
                // Bugun allaqachon kirilgan
            } else {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (lastDate === yesterday.toDateString()) {
                    streak = parseInt(streak) + 1;
                } else if (!lastDate) {
                    streak = 1;
                } else {
                    streak = 1; // Streak uzilgan bo'lsa qaytadan boshlash
                }
                localStorage.setItem('hottie_streak', streak);
                localStorage.setItem('hottie_last_date', today);
            }
            document.getElementById('streak-counter').innerText = streak;
        }

        function addTask() {
            const textInput = document.getElementById('task-input');
            const categoryInput = document.getElementById('category-input');
            
            if (!textInput.value.trim()) return;

            const newTask = {
                id: Date.now(),
                text: textInput.value.trim(),
                category: categoryInput.value,
                completed: false,
                date: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            tasks.push(newTask);
            textInput.value = '';
            saveAndRefresh();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            
            // Agar vazifa bajarilsa bildirishnoma yuborish
            const task = tasks.find(t => t.id === id);
            if (task && task.completed && Notification.permission === "granted") {
                new Notification("Muvaffaqiyat! 🎉", {
                    body: `"${task.text}" vazifasini a'lo darajada yakunladingiz. To'xtamang!`,
                    icon: "https://images.pexels.com/photos/3184292/pexels-photo-3184292.jpeg"
                });
            }
            
            saveAndRefresh();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRefresh();
        }

        function filterTasks(category, element) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderTasks();
        }

        function saveAndRefresh() {
            localStorage.setItem('hottie_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('tasks-container');
            container.innerHTML = '';

            const filtered = tasks.filter(t => currentFilter === 'all' || t.category === currentFilter);

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">Hozircha hech qanday maqsad yoki vazifa yo'q. Yangi maqsad qo'shing!</div>`;
                updateAnalytics(0, 0);
                return;
            }

            filtered.forEach(task => {
                const item = document.createElement('div');
                item.className = `task-item ${task.completed ? 'completed' : ''}`;
                item.innerHTML = `
                    <div class="task-left">
                        <div class="checkbox-custom" onclick="toggleTask(${task.id})"></div>
                        <div>
                            <div>${task.text}</div>
                            <div class="task-meta">
                                <span class="tag tag-${task.category}">${task.category}</span>
                                <span><i class="far fa-clock"></i> ${task.date}</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${task.id})"><i class="fas fa-trash-alt"></i></button>
                `;
                container.appendChild(item);
            });

            // Analitika hisoblash
            const completedCount = tasks.filter(t => t.completed).length;
            const totalCount = tasks.length;
            updateAnalytics(completedCount, totalCount);
        }

        function updateAnalytics(completed, total) {
            const remaining = total - completed;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);

            document.getElementById('stats-completed').innerText = completed;
            document.getElementById('stats-remaining').innerText = remaining;
            document.getElementById('progress-percentage').innerText = `${percentage}%`;

            // SVG doira progressni yangilash
            const circle = document.getElementById('progress-bar');
            const circumference = 2 * Math.PI * 50; // r=50 -> 314
            const offset = circumference - (percentage / 100) * circumference;
            circle.style.strokeDashoffset = offset;
        }
    </script>
</body>
</html>
